services:
  caddy:
    image: caddy:latest
    container_name: "${PROJECT_NAME}_caddy"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./docker-init/data/caddy:/data
      - ./docker-init/config/caddy:/config
    environment:
      - EMAIL=${EMAIL}
      - PROJECT_BASE_URL=${PROJECT_BASE_URL}
    networks:
      - default
    restart: unless-stopped
