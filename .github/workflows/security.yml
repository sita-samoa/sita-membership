name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  composer-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./laravel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit Composer dependencies
        run: composer audit --format=table --locked

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./laravel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate
